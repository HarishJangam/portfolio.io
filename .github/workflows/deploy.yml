name: Deploy Static Content to Pages

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Activates caching for faster builds

      - name: Install dependencies
        run: npm ci # Use 'npm install' if you don't have a package-lock.json yet

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # CRITICAL: This must match your framework's build output folder!
          # (e.g., 'dist' for Vite, 'out' for Next.js, 'build' for Create React App)
          path: './dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
